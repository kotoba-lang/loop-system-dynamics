name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: loop-system-dynamics
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/dynamics
          path: dynamics
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/org-oasis-open-xmile
          path: org-oasis-open-xmile
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/org-omg-sysmlv2
          path: org-omg-sysmlv2
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/dsl-core
          path: dsl-core
          # pinned: dsl-core's main has since migrated kotoba.dsl.problem to
          # .kotoba (no longer directly nbb-requireable); this is the SHA
          # org-oasis-open-xmile/org-omg-sysmlv2's own deps.edn still pin,
          # which still carries the working .cljc.
          ref: ac8554fe4c29dc55fc78a850044888dfcc4e1e8b
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g nbb
      - working-directory: loop-system-dynamics
        run: npm install
      - working-directory: loop-system-dynamics
        run: nbb --classpath "../dynamics/src:../org-oasis-open-xmile/src:../org-omg-sysmlv2/src:../dsl-core/src:src:test" test/run_tests.cljs
